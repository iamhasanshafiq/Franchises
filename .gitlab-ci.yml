image: node:22

stages:
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

pages:
  stage: deploy
  script:
    # Install dependencies and build the Vite app
    - npm ci
    - npm run build
    # GitLab Pages expects a ./public directory
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    # Only deploy from the default branch
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

